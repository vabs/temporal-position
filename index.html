<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal Position</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">TEMPORAL_POSITION</h1>
        </header>

        <main class="main-content">
            <div class="datetime-section">
                <div class="date-display" id="currentDate">Monday, January 19, 2026</div>
                <div class="time-display">
                    <div class="current-time" id="currentTime">00:00</div>
                    <div class="timezone" id="timezone">UTC +00:00</div>
                </div>
            </div>

            <div class="progress-grid">
                <div class="progress-section">
                    <div class="progress-header">
                        <div class="progress-label-group">
                            <div class="progress-label">DAY</div>
                            <div class="progress-subtitle" id="dayCycles">Cycles remaining: 0h 0m</div>
                        </div>
                        <div class="progress-percentage" id="dayPercentage">0%</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-segments" id="daySegments"></div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-header">
                        <div class="progress-label-group">
                            <div class="progress-label">WEEK</div>
                            <div class="progress-subtitle" id="weekInfo">Current: Week 00 of 52</div>
                        </div>
                        <div class="progress-percentage week-percentage" id="weekPercentage">0%</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-segments" id="weekSegments"></div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-header">
                        <div class="progress-label-group">
                            <div class="progress-label">MONTH</div>
                            <div class="progress-subtitle" id="monthPhase">Jan Phase: Waxing Crescent</div>
                        </div>
                        <div class="progress-percentage month-percentage" id="monthPercentage">0%</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-segments" id="monthSegments"></div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-header">
                        <div class="progress-label-group">
                            <div class="progress-label">YEAR</div>
                            <div class="progress-subtitle" id="yearEra">Era: 2026 Quarter 1</div>
                        </div>
                        <div class="progress-percentage year-percentage" id="yearPercentage">0%</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-segments" id="yearSegments"></div>
                    </div>
                </div>
            </div>

            <section class="on-this-day">
                <div class="section-header">
                    <svg class="clock-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <h2 class="section-title">ON THIS DAY</h2>
                </div>
                <div class="events-container" id="eventsContainer">
                    <div class="loading">Loading historical events...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
